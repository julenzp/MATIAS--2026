<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERBI — Panel de Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --primary: #5b7ff5;
      --primary-light: #e8edfe;
      --success: #10b981;
      --success-light: #d1fae5;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.06); text-align: center; }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .login-card p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; padding: 0.875rem 1rem; font-size: 1.25rem; border: 2px solid var(--border); border-radius: var(--radius); text-align: center; letter-spacing: 0.15em; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
    .login-card input:focus { border-color: var(--primary); }
    .login-card button { width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; background: var(--primary); color: white; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.2s; }
    .login-card button:hover { opacity: 0.9; }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem; }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .header-actions { display: flex; gap: 0.5rem; }
    .btn { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.35rem; }
    .btn:hover { background: var(--bg); }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { opacity: 0.9; background: var(--primary); }
    .btn-danger { color: var(--danger); }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* Summary Cards */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .summary-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.5rem; }
    .summary-card .value { font-size: 2rem; font-weight: 700; }
    .summary-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .summary-card.success .value { color: var(--success); }
    .summary-card.warning .value { color: var(--warning); }
    .summary-card.danger .value { color: var(--danger); }

    /* Tables */
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
    .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-header h2 { font-size: 1rem; font-weight: 600; }
    .panel-header .badge { font-size: 0.7rem; background: var(--primary-light); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 999px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.65rem 1rem; color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--border); background: var(--bg); }
    td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .status { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
    .status-active { background: var(--success-light); color: #065f46; }
    .status-incident { background: var(--warning-light); color: #92400e; }
    .status-inactive { background: #f1f5f9; color: var(--muted); }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* Tabs */
    .tabs { display: flex; gap: 0.25rem; padding: 0 1.25rem; background: var(--bg); border-bottom: 1px solid var(--border); }
    .tab { padding: 0.65rem 1rem; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--text); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Refresh animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; }

    /* Responsive */
    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .summary-card .value { font-size: 1.5rem; }
      .header h1 { font-size: 1rem; }
      .container { padding: 1rem; }
      table { font-size: 0.78rem; }
      th, td { padding: 0.5rem 0.65rem; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="font-size:2.5rem; margin-bottom:0.75rem;">🚐</div>
    <h1>ERBI Control</h1>
    <p>Introduce tu código de acceso<br>(5 números + 1 letra)</p>
    <input id="pinInput" type="text" maxlength="6" placeholder="12345A" autocomplete="off" />
    <button id="loginBtn" onclick="doLogin()">Acceder</button>
    <div id="loginError" class="login-error" style="display:none;"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" class="dashboard">
  <div class="header">
    <h1>🚐 ERBI Control</h1>
    <div class="header-actions">
      <button class="btn" onclick="refreshData()" id="refreshBtn">🔄 Actualizar</button>
      <button class="btn btn-danger" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="container">
    <!-- Date -->
    <p style="color:var(--muted); font-size:0.85rem; margin-bottom:1rem;" id="dateLabel"></p>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card" id="cardRoutes">
        <div class="label">Rutas activas</div>
        <div class="value" id="valRoutes">—</div>
        <div class="sub">rutas con viajes hoy</div>
      </div>
      <div class="summary-card" id="cardIncidents">
        <div class="label">Incidencias (7 días)</div>
        <div class="value" id="valIncidents">—</div>
        <div class="sub">últimos 7 días</div>
      </div>
      <div class="summary-card" id="cardUsers">
        <div class="label">Usuarios activos</div>
        <div class="value" id="valUsers">—</div>
        <div class="sub">pasajeros registrados</div>
      </div>
      <div class="summary-card" id="cardStatus">
        <div class="label">Estado general</div>
        <div class="value" id="valStatus">—</div>
        <div class="sub" id="valStatusSub"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="panel">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('routes')">Rutas</button>
        <button class="tab" onclick="switchTab('incidents')">Incidencias</button>
        <button class="tab" onclick="switchTab('passengers')">Usuarios</button>
      </div>

      <!-- Routes Tab -->
      <div id="tab-routes" class="tab-content active">
        <div id="routesTable"></div>
      </div>

      <!-- Incidents Tab -->
      <div id="tab-incidents" class="tab-content">
        <div id="incidentsTable"></div>
      </div>

      <!-- Passengers Tab -->
      <div id="tab-passengers" class="tab-content">
        <div id="passengersTable"></div>
      </div>
    </div>
  </div>
</div>

<script>
const STANDALONE_SW_RELOAD_GUARD = 'erbi:standalone_sw_reload_once';

(function setupStandaloneAutoUpdater() {
  if (!('serviceWorker' in navigator)) return;

  let registration = null;
  let listenersAttached = false;
  const watchedInstalling = new WeakSet();

  function safeReloadOnce() {
    try {
      if (sessionStorage.getItem(STANDALONE_SW_RELOAD_GUARD) === '1') return;
      sessionStorage.setItem(STANDALONE_SW_RELOAD_GUARD, '1');
    } catch (e) {}
    window.location.reload();
  }

  function activateWaiting(worker) {
    if (!worker) return;
    try {
      worker.postMessage({ type: 'SKIP_WAITING' });
    } catch (e) {
      console.warn('[Standalone SW] activate waiting failed', e);
    }
  }

  function watchInstalling(worker) {
    if (!worker) return;
    if (watchedInstalling.has(worker)) return;
    watchedInstalling.add(worker);

    worker.addEventListener('statechange', function () {
      if (worker.state === 'installed') {
        activateWaiting((registration && registration.waiting) || worker);
      }
    });
  }

  async function checkForUpdates() {
    try {
      registration = registration || (await navigator.serviceWorker.getRegistration());
      if (!registration) return;

      if (!listenersAttached) {
        listenersAttached = true;
        navigator.serviceWorker.addEventListener('controllerchange', safeReloadOnce);
        registration.addEventListener('updatefound', function () {
          watchInstalling(registration.installing);
        });
      }

      watchInstalling(registration.installing);
      activateWaiting(registration.waiting);
      await registration.update();
      activateWaiting(registration.waiting);
    } catch (e) {
      console.warn('[Standalone SW] update check failed', e);
    }
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') void checkForUpdates();
  });
  window.addEventListener('pageshow', function () { void checkForUpdates(); });
  window.addEventListener('online', function () { void checkForUpdates(); });

  void checkForUpdates();
  window.setInterval(function () { void checkForUpdates(); }, 60 * 1000);
})();

const SUPABASE_URL = 'https://cmsnpgalkulkdxagfxpo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtc25wZ2Fsa3Vsa2R4YWdmeHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2ODE1NTgsImV4cCI6MjA4MzI1NzU1OH0.Ydf01rcETJOFrA9NJ8t7Hka7IZwubJ6Nn-gpRuaOHFk';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ROUTES = ['ASPACE','AMARAEN FINDE','BERMINGHAM','FRAISORO','IGELDO','LAMOROUSE','LASARTE','MATIA','EGURTZEGI'];
const ROUTE_NAMES = {
  'ASPACE': 'ASPACE INTXAURRONDO',
  'AMARAEN FINDE': 'GUREAK Amaraene FINDE',
  'BERMINGHAM': 'MATIA BERMINGHAM',
  'FRAISORO': 'MATIA FRAISORO',
  'IGELDO': 'MATIA IGELDO',
  'LAMOROUSE': 'MATIA LAMOROUSE',
  'LASARTE': 'MATIA LASARTE',
  'MATIA': 'MATIA REZOLA',
  'EGURTZEGI': 'MATIA USURBIL',
};

// ─── Auth ───
async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!/^\d{5}[A-Za-z]$/.test(pin)) {
    errEl.textContent = 'Formato: 5 números + 1 letra';
    errEl.style.display = 'block';
    return;
  }

  const email = pin.toLowerCase() + '@erbi.local';
  const password = pin.toUpperCase();

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Accediendo...';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Código no válido o sin permisos';
    errEl.style.display = 'block';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Acceder';
    return;
  }

  // Check admin role
  const { data: { user } } = await sb.auth.getUser();
  const { data: roles } = await sb.from('user_roles').select('role').eq('user_id', user.id);
  const isAdmin = roles && roles.some(r => r.role === 'admin');

  if (!isAdmin) {
    errEl.textContent = 'Sin permisos de administrador';
    errEl.style.display = 'block';
    await sb.auth.signOut();
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Acceder';
    return;
  }

  showDashboard();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Acceder';
}

async function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  await refreshData();
}

// ─── Check existing session ───
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: roles } = await sb.from('user_roles').select('role').eq('user_id', session.user.id);
    if (roles && roles.some(r => r.role === 'admin')) {
      showDashboard();
    }
  }
})();

// Enter key
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ─── Data ───
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳ Cargando...';

  const today = new Date().toISOString().split('T')[0];
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

  try {
    // Parallel queries
    const [tripsRes, incidentsRes, passengersRes, todayAttendance] = await Promise.all([
      sb.from('schedule_trips').select('route, schedule_section, is_active').eq('is_active', true),
      sb.from('route_incidents').select('*').gte('incident_date', weekAgo).order('incident_date', { ascending: false }).limit(50),
      sb.from('passengers').select('id, name, route, is_active, contact_phone').eq('is_active', true).order('name'),
      sb.from('attendance_records').select('route, status, user_name').eq('record_date', today),
    ]);

    const trips = tripsRes.data || [];
    const incidents = incidentsRes.data || [];
    const passengers = passengersRes.data || [];
    const attendance = todayAttendance.data || [];

    // Active routes today (have trips)
    const activeRoutes = [...new Set(trips.map(t => t.route))];

    // Incidents count
    const todayIncidents = incidents.filter(i => i.incident_date === today);

    // Summary cards
    document.getElementById('valRoutes').textContent = activeRoutes.length;
    document.getElementById('valIncidents').textContent = incidents.length;
    document.getElementById('valUsers').textContent = passengers.length;

    const cardIncEl = document.getElementById('cardIncidents');
    cardIncEl.className = 'summary-card' + (incidents.length > 0 ? ' warning' : ' success');

    if (todayIncidents.length === 0) {
      document.getElementById('valStatus').textContent = '✅ Operativo';
      document.getElementById('valStatusSub').textContent = 'Sin incidencias hoy';
      document.getElementById('cardStatus').className = 'summary-card success';
    } else {
      document.getElementById('valStatus').textContent = '⚠️ Con incidencias';
      document.getElementById('valStatusSub').textContent = todayIncidents.length + ' incidencia(s) hoy';
      document.getElementById('cardStatus').className = 'summary-card warning';
    }

    // Routes table
    const routeStats = ROUTES.map(r => {
      const routeTrips = trips.filter(t => t.route === r);
      const routeIncidents = todayIncidents.filter(i => i.route === r);
      const routeAttendance = attendance.filter(a => a.route === r);
      const present = routeAttendance.filter(a => a.status === 'present').length;
      const absent = routeAttendance.filter(a => a.status === 'absent').length;
      return {
        code: r,
        name: ROUTE_NAMES[r] || r,
        sections: [...new Set(routeTrips.map(t => t.schedule_section))].length,
        incidents: routeIncidents.length,
        present, absent,
        active: routeTrips.length > 0,
      };
    });

    let routesHtml = '<table><thead><tr><th>Ruta</th><th>Secciones</th><th>Presentes</th><th>Ausentes</th><th>Incidencias</th><th>Estado</th></tr></thead><tbody>';
    routeStats.forEach(r => {
      const statusClass = !r.active ? 'status-inactive' : r.incidents > 0 ? 'status-incident' : 'status-active';
      const statusText = !r.active ? 'Sin datos' : r.incidents > 0 ? 'Con incidencias' : 'Operativo';
      routesHtml += `<tr>
        <td><strong>${r.name}</strong></td>
        <td>${r.sections}</td>
        <td>${r.present}</td>
        <td>${r.absent}</td>
        <td>${r.incidents}</td>
        <td><span class="status ${statusClass}">${statusText}</span></td>
      </tr>`;
    });
    routesHtml += '</tbody></table>';
    document.getElementById('routesTable').innerHTML = routesHtml;

    // Incidents table
    if (incidents.length === 0) {
      document.getElementById('incidentsTable').innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>Sin incidencias en los últimos 7 días</p></div>';
    } else {
      let incHtml = '<table><thead><tr><th>Fecha</th><th>Ruta</th><th>Descripción</th></tr></thead><tbody>';
      incidents.forEach(i => {
        incHtml += `<tr>
          <td>${new Date(i.incident_date + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</td>
          <td>${ROUTE_NAMES[i.route] || i.route}</td>
          <td>${i.message}</td>
        </tr>`;
      });
      incHtml += '</tbody></table>';
      document.getElementById('incidentsTable').innerHTML = incHtml;
    }

    // Passengers table
    if (passengers.length === 0) {
      document.getElementById('passengersTable').innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>Sin usuarios registrados</p></div>';
    } else {
      let pasHtml = '<table><thead><tr><th>Nombre</th><th>Ruta</th><th>Teléfono</th></tr></thead><tbody>';
      passengers.forEach(p => {
        pasHtml += `<tr>
          <td>${p.name}</td>
          <td>${ROUTE_NAMES[p.route] || p.route}</td>
          <td>${p.contact_phone || '—'}</td>
        </tr>`;
      });
      pasHtml += '</tbody></table>';
      document.getElementById('passengersTable').innerHTML = pasHtml;
    }

  } catch (err) {
    console.error('Error:', err);
  }

  btn.textContent = '🔄 Actualizar';
}

// ─── Tabs ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
